<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeeksforGeeks</title>
</head>
<body>
    <h1>GeeksforGeeks</h1>
    <h2>Basic form design using HTML</h2>
    <fieldset>
        <h3>Personal Details</h3>

        <label>First name:</label>
        <input type="text" ><br><br>

        <label>last name:</label>
        <input type="text"><br><br>

        <label>Gender:</label>
        <input type="radio" name="1" id="">Male
        <input type="radio" name="1" id="">Female<br><br>
        
        <label>Email:</label>
        <input type="text"><br><br>

        <label>Date of Birth:</label>
        <input type="number" placeholder="dd-mm-yyyy"><br><br>

        <label>Address:</label>
        <input type="text"><br><br>

        <button>Submit</button>

        
    </fieldset>

</body>
</html>
