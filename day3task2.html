<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>My feedback form</h1>

    <ul>
        <li>
        <label>Name:</label>
        <input type="text">
        </li>

       <li> 
        <label>Email:</label>
        <input type="text">  
       </li>      

        <li><label>Password:</label>
        <input type="text">
        </li><br>

        <li>Please check all the emotions that apply to you:</li>
        <ul>
            <li>
                <label >sad</label>
                <input type="checkbox">

            </li>


            <li>
                <label >Angry</label>
                <input type="checkbox"> 
            </li>  

            <li>
            <label>Happy</label>
            <input type="checkbox">
            </li> 
            
            
            <li>
                <label>Ambivalent</label>
            <input type="checkbox">
            </li>
        </ul>
    </ul>   
    <ul>
        <li>how satisfied were you with our service?</li>
        <ul>
            <li>
                <label>Very satisfied</label>
                <input type="radio">
            </li>

            <li>
                <label>Satisfied</label>
                <input type="radio">
            </li>

            <li>
                <label>Didn't care</label>
                <input type="radio">
            </li>

            <li>
                <label>Dissatisfied</label>
                <input type="radio">
            </li>

            <li>
                <label>very dissatisfied</label>
                <input type="radio">
            </li>

        </ul>
                    
        <li>
            <label>Further comments:</label>
            <input type="text">
        </li>  
        
        <li>
            <label>Bio photo</label>
            <input type="text">
            <button>Choose..</button>
        </li>

        <li>
            <label >location visited</label>
            <input type="text" placeholder="select location">
        </li>

        <li>
            <button>Submit</button>
        </li>
    </ul>
</body>
</html>
