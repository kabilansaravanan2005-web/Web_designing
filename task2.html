<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 3;
        let b = 5;
        let c = a+b;
        let d = a-b;
        let e = a*b;
        let f = a/b;
    
       document.writeln(c+"<br>");
       document.writeln(d+"<br>");
       document.writeln(e+"<br>");
       document.writeln(f);
    </script>
    
</body>
</html>
